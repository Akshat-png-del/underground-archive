services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: underground_archive
      POSTGRES_USER: archive
      POSTGRES_PASSWORD: archive_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  meilisearch:
    image: getmeili/meilisearch:v1.11
    environment:
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data

volumes:
  postgres_data:
  meili_data:
